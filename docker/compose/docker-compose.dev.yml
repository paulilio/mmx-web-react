name: mmx-dev

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ../env/postgres.env
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ../env/app.env
    environment:
      # Sobrescreve DATABASE_URL para apontar para o container postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mmx}:${POSTGRES_PASSWORD:-mmx_password}@postgres:5432/${POSTGRES_DB:-mmx}?schema=public
    volumes:
      # Bind mount do codigo fonte para HMR
      - ../..:/app
      # Preserva node_modules e .next do container (nao sobrescreve com host)
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy

  monitor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ../env/app.env
    environment:
      - MONITOR_BASE_URL=http://app:3000
      - MONITOR_START_PATH=/dashboard
      - MONITOR_INTERVAL_SECONDS=300
    volumes:
      - ../..:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      app:
        condition: service_started
    command:
      - sh
      - -c
      - |
        pnpm prisma:generate &&
        pnpm exec playwright install chromium &&
        while true; do
          node monitor/engine/runner.js --baseUrl "$$MONITOR_BASE_URL" --startPath "$$MONITOR_START_PATH"
          sleep "$$MONITOR_INTERVAL_SECONDS"
        done

volumes:
  postgres_dev_data:
