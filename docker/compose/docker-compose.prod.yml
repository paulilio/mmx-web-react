name: mmx-prod

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../env/postgres.env
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - ../env/app.prod.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  monitor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../env/app.prod.env
    environment:
      - MONITOR_BASE_URL=http://app:3000
      - MONITOR_START_PATH=/dashboard
      - MONITOR_INTERVAL_SECONDS=300
    depends_on:
      app:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        pnpm exec playwright install chromium &&
        while true; do
          node monitor/engine/runner.js --baseUrl "$$MONITOR_BASE_URL" --startPath "$$MONITOR_START_PATH"
          sleep "$$MONITOR_INTERVAL_SECONDS"
        done

volumes:
  postgres_prod_data:
