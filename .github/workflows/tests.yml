name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-api:
    name: Unit (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema packages/api/prisma/schema.prisma
      - name: Run unit tests
        working-directory: packages/api
        env:
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: pnpm exec vitest run

  unit-web:
    name: Unit (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        working-directory: packages/web
        run: pnpm exec vitest run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: packages/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E against production
        working-directory: packages/web
        env:
          E2E_BASE_URL: https://mmx-platform.vercel.app
          E2E_API_BASE: https://ca-mmx-api-alpha.happymushroom-aaae7c9b.eastus.azurecontainerapps.io
        run: pnpm exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 7

  smoke:
    name: Smoke (production)
    runs-on: ubuntu-latest
    # Roda só após push em main (já deployado) ou manualmente
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        env:
          API_URL: https://ca-mmx-api-alpha.happymushroom-aaae7c9b.eastus.azurecontainerapps.io
          WEB_URL: https://mmx-platform.vercel.app
        run: bash scripts/smoke/smoke.sh
