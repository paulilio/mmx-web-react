name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-api:
    name: Unit (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema packages/api/prisma/schema.prisma
      - name: Run unit tests
        working-directory: packages/api
        env:
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: pnpm test

  unit-web:
    name: Unit (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        working-directory: packages/web
        run: pnpm run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: packages/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Mint E2E access token (1h TTL, fresh per run)
        env:
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          MMX_E2E_TEST_USER_ID: ${{ secrets.MMX_E2E_TEST_USER_ID }}
          MMX_E2E_TEST_USER_EMAIL: ${{ secrets.MMX_E2E_TEST_USER_EMAIL }}
        run: |
          token="$(node scripts/e2e-token.mjs)"
          if [[ -z "$token" ]]; then
            echo "::error::e2e-token.mjs retornou vazio — verifique se os secrets JWT_ACCESS_SECRET, MMX_E2E_TEST_USER_ID e MMX_E2E_TEST_USER_EMAIL estão configurados em Settings → Secrets."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "MMX_E2E_TOKEN=$token" >> $GITHUB_ENV
      - name: Run E2E against production
        working-directory: packages/web
        env:
          E2E_BASE_URL: https://app.moedamix.com.br
          E2E_API_BASE: https://api.moedamix.com.br
          E2E_COOKIE_DOMAIN: .moedamix.com.br
          # MMX_E2E_TOKEN vem do step anterior via $GITHUB_ENV — globalSetup
          # detecta o override e reusa sem mintar de novo, e o spec usa pra cleanup.
        run: pnpm exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 7

  smoke:
    name: Smoke (production)
    runs-on: ubuntu-latest
    # Roda só após push em main (já deployado) ou manualmente
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run public smoke tests
        env:
          API_URL: https://api.moedamix.com.br
          WEB_URL: https://app.moedamix.com.br
        run: bash scripts/smoke/smoke.sh
      - name: Run authenticated recurrence smoke
        env:
          API_URL: https://api.moedamix.com.br
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          MMX_E2E_TEST_USER_ID: ${{ secrets.MMX_E2E_TEST_USER_ID }}
          MMX_E2E_TEST_USER_EMAIL: ${{ secrets.MMX_E2E_TEST_USER_EMAIL }}
        run: node scripts/smoke/recurring.mjs
