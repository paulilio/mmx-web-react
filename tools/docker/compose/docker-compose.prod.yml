name: mmx-prod

services:

  backend:
    profiles: ["split"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: ${MMX_API_IMAGE:-mmx-api:local}
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ../env/app.prod.env
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mmx}:${POSTGRES_PASSWORD:-mmx_password}@postgres:5432/${POSTGRES_DB:-mmx}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../env/postgres.env
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - ../env/app.prod.env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  monitor:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.monitor
    restart: unless-stopped
    env_file:
      - ../env/app.prod.env
    environment:
      - MONITOR_BASE_URL=http://host.docker.internal:3000
      - MONITOR_START_PATH=/dashboard
      - MONITOR_INTERVAL_SECONDS=300
      - MONITOR_PHASE1_ENABLED=true
      - MONITOR_PHASE1_ENFORCE=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        while true; do
          node monitor/engine/runner.js --baseUrl "$$MONITOR_BASE_URL" --startPath "$$MONITOR_START_PATH"
          sleep "$$MONITOR_INTERVAL_SECONDS"
        done

volumes:
  postgres_prod_data:
